<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Revisão do carrinho com totais, frete, descontos, pontos e detalhes de privacidade da compra." />
  <meta name="theme-color" content="#365e57" />
  <title>Raízes do Nordeste | Carrinho</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body data-page="carrinho">
  <header data-app-header></header>

  <main id="main-content" class="page">
    <section class="section-header">
      <p class="eyebrow">Carrinho</p>
      <h1>Analise seu pedido antes de finalizar!</h1>
    </section>

    <section class="page-progress" aria-label="Etapas do pedido">
      <article class="progress-step is-complete">
        <span>1</span>
        <div>
          <strong>Cadastro</strong>
          <small>Login</small>
        </div>
      </article>
      <article class="progress-step is-complete">
        <span>2</span>
        <div>
          <strong>Cardápio</strong>
          <small>Acabe agora mesmo com a sua fome!</small>
        </div>
      </article>
      <article class="progress-step is-active">
        <span>3</span>
        <div>
          <strong>Carrinho</strong>
          <small>Finalize seu pedido!</small>
        </div>
      </article>
      <article class="progress-step">
        <span>4</span>
        <div>
          <strong>Pagamento</strong>
          <small>Revisão e confirmação</small>
        </div>
      </article>
    </section>

    <section class="checkout-layout">
      <article class="panel">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Produtos selecionados</p>
            <h2>Seu carrinho</h2>
          </div>
        </div>
        <div id="cart-items"></div>
      </article>
      <aside class="sidebar-stack">
        <aside id="cart-summary" class="panel"></aside>
        <section class="panel">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Privacidade</p>
              <h2>Tratamento de dados durante a compra</h2>
            </div>
          </div>
        </section>
      </aside>
    </section>
  </main>

  <footer data-app-footer></footer>

  <script src="js/mock.js"></script>
  <script src="js/app.js"></script>
  <script src="js/carrinho.js"></script>
</body>
</html>
