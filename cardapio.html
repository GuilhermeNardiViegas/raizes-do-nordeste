<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Cardápio dinâmico por unidade com filtros, campanhas e acesso rápido ao carrinho." />
  <meta name="theme-color" content="#365e57" />
  <title>Raízes do Nordeste | Cardápio</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="cardapio">
  <header data-app-header></header>

  <main id="main-content" class="page">
<section class="section-header cardapio-banner">

  <div class="banner-texto">
    <p class="eyebrow">Cardápio</p>
    <h1>Faça seu pedido agora mesmo!</h1>
    <p>Os melhores sabores do Nordeste preparados especialmente para você.</p>
  </div>

  <img
    src="assets/img/cardapio-banner.png"
    alt="Pratos da culinária nordestina">

</section>

    <section class="page-progress" aria-label="Etapas do pedido">
      <article class="progress-step is-complete">
        <span>1</span>
        <div>
          <strong>Cadastro</strong>
          <small>Login</small>
        </div>
      </article>
      <article class="progress-step is-complete">
        <span>2</span>
        <div>
          <strong>Unidade</strong>
          <small>Escolha a filial mais próxima de você!</small>
        </div>
      </article>
      <article class="progress-step is-active">
        <span>3</span>
        <div>
          <strong>Cardápio</strong>
          <small>Acabe agora mesmo com a sua fome!</small>
        </div>
      </article>
      <article class="progress-step">
        <span>4</span>
        <div>
          <strong>Pagamento</strong>
          <small>Revisão e confirmação</small>
        </div>
      </article>
    </section>

    <section id="menu-unit-hero" class="panel"></section>

    <section class="panel">
      <div class="section-heading">
        <div>
          <p class="eyebrow">Pesquisar:</p>
          <h2>O que você procura?</h2>
        </div>
      </div>
      <div class="filters">
        <label class="field">
          <span>Buscar</span>
          <input id="menu-search" type="search" inputmode="search" placeholder="Ex.: Tapioca, açaí, etc..." />
        </label>
        <label class="field">
          <span>Categoria</span>
          <select id="menu-category">
            <option value="all">Todas as categorias</option>
          </select>
        </label>
      </div>
    </section>

    <section class="commerce-layout">
      <div class="content-stack">
        <section id="menu-list" class="grid menu-grid"></section>
      </div>
      <aside class="sidebar-stack">
        <article id="menu-campaigns" class="panel"></article>
        <aside id="menu-cart-cta" class="panel"></aside>
      </aside>
    </section>
  </main>

  <footer data-app-footer></footer>

  <script src="js/mock.js"></script>
  <script src="js/app.js"></script>
  <script src="js/cardapio.js"></script>
</body>
</html>
