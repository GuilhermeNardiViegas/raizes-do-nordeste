<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Cadastro do cliente com consentimento, preferências de atendimento e foco em transparência no uso de dados." />
  <meta name="theme-color" content="#365e57" />
  <title>Raízes do Nordeste | Cadastro</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body data-page="cadastro">
  <header data-app-header></header>

  <main id="main-content" class="page">
    <section class="section-header">
      <h1>Crie sua conta!</h1>
    </section>

    <section class="grid grid-two">
      <form id="register-form" class="panel form-grid form-large" data-register-form data-consent-source="cadastro">
        <label class="field">
          <span>Nome completo</span>
          <input type="text" name="name" autocomplete="name" placeholder="Digite seu nome completo." required />
        </label>
        <label class="field">
          <span>E-mail</span>
          <input type="email" name="email" autocomplete="email" inputmode="email" placeholder="@email.com" required />
        </label>
        <label class="field">
          <span>Telefone</span>
          <input type="tel" name="phone" autocomplete="tel" inputmode="tel" placeholder="(00) 0000-0000" required />
        </label>
        <label class="field">
          <span>Senha</span>
          <input type="password" name="password" autocomplete="new-password" minlength="6" placeholder="Mínimo de 8 caracteres" required />
        </label>
        <label class="checkbox-field">
          <input type="checkbox" name="consent" required />
          <span>Autorizo o uso de meus dados para autenticação e histórico de pedidos.</span>
        </label>
        <label class="checkbox-field">
          <input type="checkbox" name="marketing" />
          <span>Desejo receber anúncios personalizados.</span>
        </label>
        <div class="form-actions">
          <button class="button button-primary" type="submit">Criar conta</button>
          <a class="button button-secondary" href="index.html">Voltar</a>
        </div>
      </form>
    </section>
  </main>

  <footer data-app-footer></footer>

  <script src="js/mock.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
